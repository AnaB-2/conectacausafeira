<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./css/cadastrar.css">
  <title>Cadastrar</title>
</head>

<body>
  <div class="main-content">
    <div class="login-container">
      <h2>Cadastre-se</h2>
      <form id="formCadastrar">
        <label for="nome">Nome: </label><input name="nome" type="text" placeholder="Nome" required />
        <label for="email">E-mail: </label><input name="email" type="email" placeholder="Email" required />
        <label for="tel">Telefone: </label><input name="tel" type="tel" placeholder="Telefone" required />
        <label for="password">Senha: </label><input name="password" type="password" placeholder="Senha" required />
        
        <button type="submit">Cadastrar</button>
        <script> document.getElementById("formCadastrar").addEventListener("submit", function(event) {
    event.preventDefault();
    window.location.href = "index.html";
});
        </script>
        
        <div id="links">
          <a href="./index.html" >Inicio</a>
          <a href="./entrar.html">Entrar</a>
        </div>
      </form>
    </div>
  </div>
  <script src="./script/aut.js"></script>
</body>

</html>
